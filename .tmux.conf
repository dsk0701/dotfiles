# Escキーの反応を良くする
set -sg escape-time 0

# 設定ファイルをリロードする
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# True Color対応
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

## ヴィジュアルノーティフィケーションを有効にする
setw -g monitor-activity on
set -g visual-activity on


# ----------
# screen like setting
# ----------
# Set the prefix to ^K.
unbind C-b
set -g prefix ^K

# screen ^C c 
unbind ^C
bind ^C new-window
unbind c
bind c new-window

# detach ^D d
unbind ^D
bind ^D detach

# displays * 
unbind *
bind * list-clients

# next ^@ ^N sp n 
unbind ^@
bind ^@ next-window
unbind ^N
bind ^N next-window
unbind " "
bind " " next-window
unbind n
bind n next-window

# title A
unbind A
bind A command-prompt "rename-window %%"

# other ^A
unbind ^A
bind ^A last-window

# prev ^H ^P p ^? 
unbind ^H
bind ^H previous-window
unbind ^P
bind ^P previous-window


# ----------
# vim like setting
# ----------

# コピーモード突入
bind Escape copy-mode

# ペースト
bind p paste-buffer
# vでマーク開始
bind -T copy-mode-vi v send -X begin-selection
# yでヤンク
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"

# split windows like vim
# vim's definition of a horizontal/vertical split is reversed from tmux's
bind s split-window -v
bind v split-window -h

# move around panes with hjkl, as one would in vim after pressing ctrl-w
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# resize panes like vim
# feel free to change the "1" to however many lines you want to resize by, only
# one at a time can be slow
bind < resize-pane -L 1
bind > resize-pane -R 1
bind - resize-pane -D 1
bind + resize-pane -U 1

# bind : to command-prompt like vim
# this is the default in tmux already
bind : command-prompt

# vi-style controls for copy mode
setw -g mode-keys vi


# ステータスラインカスタム関連(プラグイン未使用)
# ----------
# Gruvbox Dark カラーテーマ
# ----------
# Gruvbox Dark palette
#   bg:     #282828  bg1:    #3C3836  bg2:    #504945
#   bg3:    #665C54  fg:     #EBDBB2  fg4:    #A89984
#   red:    #FB4934  green:  #B8BB26  yellow: #FABD2F
#   blue:   #83A598  purple: #D3869B  aqua:   #8EC07C
#   orange: #FE8019

# ペインボーダー
set -g pane-border-style fg=#504945
set -g pane-active-border-style fg=#8EC07C

# ステータスバー全体
set -g status-style bg=#282828,fg=#EBDBB2
set -g status-left-length 32
set -g status-right-length 150
set -g status-justify left

# 左: ホスト名 + セッション名
set -g status-left '#[fg=#282828,bg=#FABD2F,bold] #(hostname -s) #[fg=#FABD2F,bg=#3C3836]#[fg=#EBDBB2,bg=#3C3836] #S #[fg=#3C3836,bg=#282828]'

# ウィンドウリスト
set -g window-status-format "#[fg=#A89984,bg=#282828]  #I #W "
set -g window-status-current-format "#[fg=#282828,bg=#8EC07C]#[fg=#282828,bg=#8EC07C,bold] #I #W #[fg=#8EC07C,bg=#282828]"
set -g window-status-separator ""

# 右: メモリ / ロードアベレージ / 日時
set -g status-right '#[fg=#3C3836,bg=#282828]#[fg=#EBDBB2,bg=#3C3836] #(~/.tmux/used-mem/used-mem)%% #[fg=#504945,bg=#3C3836]#[fg=#EBDBB2,bg=#504945] LAve.#(~/.tmux/loadaverage) #[fg=#FE8019,bg=#504945]#[fg=#282828,bg=#FE8019,bold] %m/%d(%a) %H:%M '

# メッセージ
set -g message-style fg=#282828,bg=#FABD2F,bold

